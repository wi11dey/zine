name:                webrender-api
version:             0.1.0.0
github:              "githubuser/webrender-api"
license:             BSD-3-Clause
author:              "Author name here"
maintainer:          "example@example.com"
copyright:           "2026 Author name here"
build-type:          Custom

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/webrender-api#readme>

custom-setup:
  dependencies:
  - base >= 4.7 && < 5
  - Cabal
  - directory
  - process
  - regex-tdfa
  - containers

dependencies:
- base >= 4.7 && < 5
- mtl
- template-haskell
- language-c
- filepath
- process

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

default-extensions:
- BlockArguments
- GeneralizedNewtypeDeriving
- NamedFieldPuns

library:
  source-dirs: src

tests:
  webrender-api-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - webrender-api
